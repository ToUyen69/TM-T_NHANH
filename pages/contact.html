<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên hệ — Nhành</title>
<meta name="description" content="Liên hệ với Nhành: hotline, email, địa chỉ và mạng xã hội.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="../public/logo/logo TMĐT.jpg">
<link rel="stylesheet" href="../assets/css/style.css?v=68">
</head>
<body>

<section class="page-hero">
  <div class="wrap">
    <span class="eyebrow">Liên hệ</span>
    <h1>Liên hệ với Nhành</h1>
    <p>Nhành luôn sẵn lòng lắng nghe. Hãy nhắn cho chúng tôi như nhắn cho một người bạn.</p>
  </div>
</section>

<section class="section">
  <div class="wrap contact-layout">
    <div>
      <span class="eyebrow">Gửi lời nhắn</span>
      <h2>Chúng tôi sẽ phản hồi sớm nhất</h2>
      <form id="contactForm" class="mt-3">
        <div class="form-grid">
          <div class="field"><label>Họ và tên</label><input type="text" required></div>
          <div class="field"><label>Email</label><input type="email" required></div>
        </div>
        <div class="field"><label>Chủ đề</label><select><option>Tư vấn sản phẩm</option><option>Đặt quà theo yêu cầu</option><option>Hợp tác / B2B</option><option>Khác</option></select></div>
        <div class="field"><label>Lời nhắn</label><textarea required placeholder="Nhành có thể giúp gì cho bạn?"></textarea></div>
        <button class="btn btn-primary" type="submit">Gửi lời nhắn</button>
      </form>
    </div>
    <div class="contact-info">
      <span class="eyebrow">Thông tin liên hệ</span>
      <h2>Nhành Vietnam</h2>
      <div class="mt-2" id="ciRows"></div>
      <div class="social-row" id="ciSocial" style="margin-top:22px"></div>
      <div style="margin-top:26px;position:relative;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)">
        <iframe
          title="Bản đồ Nhành"
          src="https://maps.google.com/maps?q=669+%C4%90%E1%BB%97+M%C6%B0%E1%BB%9Di%2C+Linh+Xu%C3%A2n%2C+Th%E1%BB%A7+%C4%90%E1%BB%A9c%2C+TP.HCM&hl=vi&z=17&output=embed"
          style="width:100%;height:340px;border:0;display:block"
          allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);white-space:nowrap">
          <a href="https://maps.google.com/?q=669+%C4%90%E1%BB%97+M%C6%B0%E1%BB%9Di,+Linh+Xu%C3%A2n,+Th%E1%BB%A7+%C4%90%E1%BB%A9c,+TP.HCM"
             target="_blank" rel="noopener"
             style="display:inline-flex;align-items:center;gap:7px;background:var(--green-800);color:#fff;padding:9px 20px;border-radius:50px;font-size:.84rem;font-weight:600;text-decoration:none;box-shadow:0 2px 14px rgba(0,0,0,.28)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Mở Google Maps
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="../assets/js/data.js?v=68"></script>
<script src="../assets/js/app.js?v=68"></script>
<script>
document.addEventListener('nhanh:ready', function () {
  var D = window.NHANH, NH = window.NH, b = D.brand;
  NH.qs('#ciRows').innerHTML =
    '<div class="ci-row">' + NH.icon.pin + '<div><h4>Địa chỉ</h4><p>' + b.address + '</p></div></div>' +
    '<div class="ci-row">' + NH.icon.phone + '<div><h4>Hotline</h4><p>' + b.hotline + '</p></div></div>' +
    '<div class="ci-row">' + NH.icon.mail + '<div><h4>Email</h4><p>' + b.email + '</p></div></div>' +
    '<div class="ci-row">' + NH.icon.clock + '<div><h4>Giờ làm việc</h4><p>8:00 – 21:00, tất cả các ngày</p></div></div>';
  NH.qs('#ciSocial').innerHTML =
    '<a href="' + b.social.facebook + '" target="_blank" rel="noopener">' + NH.icon.fb + '</a>' +
    '<a href="' + b.social.instagram + '" target="_blank" rel="noopener">' + NH.icon.ig + '</a>' +
    '<a href="' + b.social.tiktok + '" target="_blank" rel="noopener">' + NH.icon.tt + '</a>';
  NH.qs('#contactForm').addEventListener('submit', function (e) { e.preventDefault(); NH.toast('Cảm ơn bạn! Nhành đã nhận được lời nhắn.'); e.target.reset(); });
});
</script>
</body>
</html>
